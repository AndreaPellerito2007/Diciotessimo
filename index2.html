<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grazie per aver accettato! 🎉</title>
  <link href="style.css" rel="stylesheet" type="text/css">
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      // Reduced delay to 1.5 seconds for better UX
      setTimeout(() => {
        const biglietto = document.getElementById("biglietto");
        biglietto.style.opacity = 1;
        biglietto.style.transform = "translateY(0)";
      }, 1500);

      setTimeout(() => {
        const confettiContainer = document.querySelector(".confetti-container");

        function createConfetti() {
          for (let i = 0; i < 60; i++) {
            let confetti = document.createElement("div");
            confetti.classList.add("confetti");

            confetti.style.left = Math.random() * 100 + "vw";
            let size = Math.random() * 30 + 20;
            confetti.style.fontSize = size + "px";
            let emojis = ["🏍️", "🎉", "🎂", "🎈"];
            confetti.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            let duration = Math.random() * 3 + 3;
            confetti.style.animationDuration = duration + "s";
            confetti.style.top = "-50px";

            confettiContainer.appendChild(confetti);
          }
        }

        createConfetti();
      }, 1500);
    });
  </script>
</head>
<body>
  <div class="confetti-container"></div>
  <img src="moto.png" alt="Moto" class="moto">

  <div class="container" id="biglietto" style="opacity: 0; transform: translateY(40px); transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1);">
    <h1 class="titolo">🎉 Grande! 🏍️</h1>
    <p class="sottotitolo">Grazie per aver accettato l'invito. Ecco i dettagli dell'evento:</p>

    <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 25px;">
        <p style="font-size: 1.2rem; font-weight: 700; margin-bottom: 10px;">📅 2 Giugno</p>
        <p style="font-size: 1.1rem; margin-bottom: 10px;">🕒 Ore 19:30</p>
        <p style="font-size: 1.1rem;">📍 <a href="https://www.bing.com/maps?&ty=0&rtp=~pos.38.164455_13.228514__Casale%20Torre%20Isabella__e_&mode=m&u=1&tt=Indicazioni&cp=38.164439~13.21661&lvl=14.5&v=2&form=S00027" target="_blank">Casale Torre Isabella</a></p>
    </div>

    <p class="sottotitolo" style="font-size: 0.9rem;">Non vediamo l'ora di festeggiare insieme!</p>
  </div>
</body>
</html>
